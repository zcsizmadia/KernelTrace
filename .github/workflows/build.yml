name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-vmlinux:
    runs-on: ubuntu-latest
    name: generate vmlinux.h
    steps:
      - uses: actions/checkout@v6

      - name: Generate vmlinux.h from kernel BTF
        run: |
          sudo apt-get update -y
          sudo apt-get install -y git make gcc pkg-config libelf-dev libcap-dev zlib1g-dev binutils-dev llvm
          git clone --depth 1 --recurse-submodules https://github.com/libbpf/bpftool.git
          pushd bpftool/src
          sudo make install -j$(nproc)
          popd
          # BTF dump reads /sys/kernel/btf/vmlinux — no kernel-version match needed.
          bpftool btf dump file /sys/kernel/btf/vmlinux format c \
            > native/probes/vmlinux.h

      - name: Upload vmlinux.h
        uses: actions/upload-artifact@v7
        with:
          name: vmlinux-h
          path: native/probes/vmlinux.h

  build:
    strategy:
      fail-fast: false
      matrix: &platform-matrix
        include:
          - runtimeId: linux-x64
            os: ubuntu-latest

          - runtimeId: linux-arm64
            os: ubuntu-24.04-arm

          - runtimeId: linux-musl-x64
            os: ubuntu-latest
            container: alpine:latest

          - runtimeId: linux-musl-arm64
            os: ubuntu-24.04-arm
            container: alpine:latest

    needs: [generate-vmlinux]
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    name: build - (${{ matrix.runtimeId }})

    steps:
      # action/checkout fails on Alpine Arm64 without this fix
      - name: Fix Alpine arm64 compatibility
        if: matrix.runtimeId == 'linux-musl-arm64'
        uses: laverdet/alpine-arm64@v1

      - uses: actions/checkout@v6

      - name: Download vmlinux.h
        uses: actions/download-artifact@v8
        with:
          name: vmlinux-h
          path: native/probes

      # Install packages needed for building the native libraries.
      - name: Install packages
        shell: sh
        run: |
          if [ -f /etc/alpine-release ]; then
            apk add --no-cache \
              build-base cmake clang git curl tar bash icu pkgconf libbpf-dev linux-headers
          else
            sudo apt-get update -y
            sudo apt-get install -y libbpf-dev clang
          fi

      - name: Install .NET SDKs
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Build native library
        shell: bash
        run: |
          cmake -S native -B native/build -DCMAKE_BUILD_TYPE=Release
          cmake --build native/build --parallel $(nproc)
          # Copy all native outputs to the RID-based path consumed by .NET's
          # native resolver and by the NuGet pack in the build-nupkg job.
          mkdir -p runtimes/${{ matrix.runtimeId }}/native
          cp native/build/libkerneltrace.so runtimes/${{ matrix.runtimeId }}/native/
          cp native/build/*.bpf.o runtimes/${{ matrix.runtimeId }}/native/

      - name: Build
        shell: bash
        run: |
          dotnet restore #-r ${{ matrix.runtimeId }}
          dotnet build -c Release --no-restore

      - name: Test
        shell: bash
        run: |
          # Cannot run integration tests without sudo, only run generic tests
          dotnet test -c Release --no-build --no-restore /tests/KernelTrace.Tests/
          dotnet test -c Release --no-build --no-restore /tests/KernelTrace.Generators.Tests/

      - name: Integration tests
        # Only Linux non-container runners are expected to have the necessary capabilities for integration tests.
        #if: matrix.runtimeId == 'linux-x64' || matrix.runtimeId == 'linux-arm64'
        if: runner.os == 'Linux' && matrix.container == null
        shell: bash
        run: |
          # Preserve the runner's PATH so dotnet is found under sudo.
          # CAP_BPF + CAP_PERFMON are available to root, which satisfies
          # the RequiresBpfAttribute skip guard.
          # Only Linux non-container runners are expected to have
          # the necessary capabilities for integration tests.
          sudo env PATH="$PATH" dotnet test tests/KernelTrace.IntegrationTests \
            -c Release --no-build --no-restore

      - name: Upload native library artifact
        uses: actions/upload-artifact@v7
        with:
          name: runtimes-${{ matrix.runtimeId }}
          path: runtimes

  build-nupkg:
    needs: [build]
    runs-on: ubuntu-latest
    if: always() && needs.build.result == 'success'
    steps:
      - uses: actions/checkout@v6

      - name: Install .NET SDKs
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x

      - name: Download all native library artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: runtimes-*
          path: runtimes
          merge-multiple: true

      - name: Pack NuGet package
        shell: bash
        run: |
          dotnet pack -c Release -o nupkgs

      - name: Upload NuGet package artifact
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: nupkgs/*.nupkg
